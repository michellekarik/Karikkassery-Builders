<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karikkassery Builders – Premium Homes in Kerala</title>
  <meta name="description" content="Karikkassery Builders – Premium Homes in Kerala. Explore our properties, completed projects, and contact us today." />
  <meta name="keywords" content="Karikkassery Builders, Kerala homes for sale, luxury homes Kerala, houses for sale Kerala, real estate Kerala" />
  <meta property="og:title" content="Karikkassery Builders – Premium Homes in Kerala" />
  <meta property="og:description" content="A family-run builder with decades of trust. Find your dream home with Karikkassery Builders." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Josefin+Sans:wght@200;300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --burgundy: #6B1A2A;
      --burgundy-dark: #4A0F1C;
      --burgundy-light: #8C2238;
      --burgundy-pale: #F5EAEC;
      --white: #FAFAF8;
      --off-white: #F2EFE9;
      --black: #0D0D0D;
      --charcoal: #1A1A1A;
      --mid-grey: #888;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Josefin Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--font-body);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 3rem;
      transition: background 0.4s, backdrop-filter 0.4s;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(107,26,42,0.3);
    }
    nav.scrolled {
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(107,26,42,0.3);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.02em;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-logo-img {
      height: 2rem;
      width: auto;
    }
    .nav-logo span { color: var(--burgundy-light); }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--burgundy-light); }
    .nav-cta {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--burgundy);
      border: none;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s;
    }
    .nav-cta:hover { background: var(--burgundy-light); }

    /* ── HAMBURGER (mobile) ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 1.5px;
      background: white;
      transition: 0.3s;
    }
    .hamburger.open span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }
    .hamburger.open span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    /* MOBILE MENU */
    .mobile-nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      transform: translateY(-100%);
      transition: transform 0.4s ease;
      z-index: 200;
    }
    .mobile-nav a {
      font-family: var(--font-body);
      font-size: 1.2rem;
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .mobile-nav a:hover { color: var(--burgundy-light); }
    .mobile-nav.active { transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links, .nav-cta { display: none; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="mainNav">
    <a href="#hero" class="nav-logo">
      <img src="KB.png" alt="KB Logo" class="nav-logo-img">
      Karikkassery Builders
    </a>
    <ul class="nav-links">
      <li><a href="#properties">Properties</a></li>
      <li><a href="#about">About Us</a></li>
      <li><a href="#completed">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <a href="#contact" class="nav-cta">Enquire Now</a>
    <div class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- MOBILE NAVIGATION MENU -->
  <div class="mobile-nav" id="mobileNav">
    <a href="#properties" onclick="toggleMenu()">Properties</a>
    <a href="#about" onclick="toggleMenu()">About Us</a>
    <a href="#completed" onclick="toggleMenu()">Projects</a>
    <a href="#contact" onclick="toggleMenu()">Contact</a>
    <a href="#contact" class="btn-cta" onclick="toggleMenu()">Enquire Now</a>
  </div>

  <!-- Rest of your page content unchanged... -->
  <!-- HERO, STATS, PROPERTIES, ABOUT, COMPLETED, CONTACT, FOOTER etc. -->

  <script>
    function toggleMenu() {
      const mobileNav = document.getElementById('mobileNav');
      mobileNav.classList.toggle('active');
      const hamburger = document.querySelector('.hamburger');
      hamburger.classList.toggle('open');
    }
  </script>
</body>
</html>
